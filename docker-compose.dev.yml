# Development stack with hot reload.
# Usage: docker compose -f docker-compose.dev.yml up --build
#   backend  -> http://localhost:8000  (uvicorn --reload, watches ./backend/app)
#   frontend -> http://localhost:5173  (vite dev with HMR, watches ./frontend)

services:
  backend:
    build:
      context: .
      target: backend
    container_name: tracker-backend-dev
    command: >
      uv run --no-dev
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
    volumes:
      # Source live-mounted; .venv stays inside the image (not overwritten).
      - ./backend/app:/app/app
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/tracker.db
    ports:
      - "8000:8000"

  frontend:
    image: mirror.gcr.io/library/node:22-slim
    container_name: tracker-frontend-dev
    working_dir: /web
    # Install on first boot (idempotent), then run vite bound to all interfaces
    # so the host browser can reach it. Polling avoids inotify gotchas across
    # bind mounts on some hosts.
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_BACKEND_URL: "http://backend:8000"
    volumes:
      - ./frontend:/web
      # Anonymous volume keeps container's node_modules; host stays clean.
      - /web/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
