services:
  backend:
    build: .
    container_name: tracker-backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    env_file:
      # Optional file holding ICS_URL (and any other secrets). Created on
      # the pi with chmod 600; not synced from the dev machine.
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: sqlite:////app/data/tracker.db
    # Bound on all interfaces so the PWA is reachable via Tailscale.
    # The pi has no public ingress (no port-forwarding); only tailnet peers
    # can reach this port.
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: tracker-worker
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - path: ./.env
        required: false
    environment:
      BACKEND_URL: http://backend:8000
      POLL_INTERVAL: "10"
    command: ["uv", "run", "--no-dev", "python", "worker/claude_worker.py"]
